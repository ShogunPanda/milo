[config]
  skip_core_tasks = true

[env]
  TARGET = { script = ["rustc -vV | sed -n 's|host: ||p'"] }

[tasks.default]
  dependencies = ["test"]

[tasks.build]
  dependencies = ["release", "debug"]

[tasks.test]
  env          = { VARIANT = "rust" }
  dependencies = ["build"]
  command      = "node"
  args         = ["--test", "../reference.js"]

[tasks.release]
  command = "cargo"
  args = [
    "build",
    "-Z",
    "unstable-options",
    "--target",
    "${TARGET}",
    "--target-dir",
    "../../tmp/references/rust/targets/release",
    "--release",
    "--artifact-dir",
    "../../tmp/references/rust/release",
  ]

[tasks.debug]
  command = "cargo"
  args = [
    "build",
    "-Z",
    "unstable-options",
    "--target",
    "${TARGET}",
    "--target-dir",
    "../../tmp/references/rust/targets/debug",
    "--artifact-dir",
    "../../tmp/references/rust/debug",
  ]
