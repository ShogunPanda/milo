[config]
  skip_core_tasks = true

[env]
  LLHTTP_WASM        = "../vendor/llhttp_simd.wasm"
  LLHTTP_WASM_COMMIT = "185e6a1513f8f00a9ef9d2cde028e8cce412b11f"
  LLHTTP_WASM_URL    = "https://raw.githubusercontent.com/nodejs/undici/${LLHTTP_WASM_COMMIT}/lib/llhttp/llhttp_simd.wasm"

[tasks.default]
  dependencies = ["build"]

[tasks.llhttp]
  script = [
    "mkdir -p ../vendor",
    "curl -L --fail --silent --show-error ${LLHTTP_WASM_URL} -o ${LLHTTP_WASM}",
  ]

[tasks.milo]
  cwd     = "../../parser"
  command = "makers"
  args    = ["wasm:release"]

[tasks.build]
  dependencies = ["llhttp", "milo"]

[tasks.benchmarks]
  command = "node"
  args    = ["src/index.js"]

[tasks.lint]
  command = "eslint"
  args    = ["--cache", "--ext", ".js", "src"]

[tasks."lint:fix"]
  command = "eslint"
  args    = ["--cache", "--fix", "--ext", ".js", "src"]

[tasks.format]
  command = "prettier"
  args    = ["-w", "src"]

[tasks.verify]
  dependencies = ["format", "lint", "benchmarks"]
