[config]
  skip_core_tasks = true

[tasks.default]
  dependencies = ["test"]

[tasks.build]
  dependencies = ["prepare", "milo", "release", "debug", "readme"]

[tasks.test]
  env          = { VARIANT = "cpp" }
  dependencies = ["build"]
  command      = "node"
  args         = ["--test", "../reference.js"]

[tasks.prepare]
  script = [
    "mkdir -p ../../tmp/references/cpp",
    "rm -rf ../../tmp/references/cpp/*",
  ]

[tasks.milo]
  dependencies = ["milo:headers", "milo:release", "milo:debug"]

[tasks.release]
  command = "clang++"
  args = [
    "-std=c++11",
    "-I",
    "../../dist/cpp/release",
    "-o",
    "../../tmp/references/cpp/release",
    "src/output.cc",
    "src/utils.cc",
    "src/reference.cc",
    "../../dist/cpp/release/libmilo.a",
  ]

[tasks.debug]
  command = "clang++"
  args = [
    "-std=c++11",
    "-I",
    "../../dist/cpp/debug",
    "-o",
    "../../tmp/references/cpp/debug",
    "src/output.cc",
    "src/utils.cc",
    "src/reference.cc",
    "../../dist/cpp/debug/libmilo.a",
  ]

[tasks.readme]
  command = "clang++"
  args = [
    "-std=c++11",
    "-I",
    "../../dist/cpp/release",
    "-o",
    "../../tmp/references/cpp/readme",
    "src/output.cc",
    "src/utils.cc",
    "src/readme.cc",
    "../../dist/cpp/release/libmilo.a",
  ]

[tasks."milo:headers"]
  cwd     = "../../parser"
  command = "makers"
  args    = ["cpp:headers"]

[tasks."milo:release"]
  cwd     = "../../parser"
  command = "makers"
  args    = ["cpp:release"]

[tasks."milo:debug"]
  cwd     = "../../parser"
  command = "makers"
  args    = ["cpp:debug"]
