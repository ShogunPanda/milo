[config]
  skip_core_tasks = true

[env]
  MILO_INCLUDE_DIR   = "../../dist/cpp/release"
  MILO_LIB           = "../../dist/cpp/release/libmilo.a"
  LLHTTP_RELEASE     = "v9.3.1"
  LLHTTP_DIR         = "../../tmp/external/llhttp-release-v9.3.1"
  LLHTTP_INCLUDE_DIR = "../../tmp/external/llhttp-release-v9.3.1/include"
  LLHTTP_LIB         = "../../tmp/external/llhttp-release-v9.3.1/build/libllhttp.a"
  OUTPUT_DIR         = "../../tmp/benchmarks/"
  OUTPUT_BIN         = "../../tmp/benchmarks/milo-cpp-benchmarks"
  MILO_RUSTFLAGS     = "-C target-cpu=native"

[tasks.default]
  dependencies = ["benchmarks"]

[tasks.benchmarks]
  dependencies = ["build"]
  command      = "${OUTPUT_BIN}"

[tasks.build]
  dependencies = ["llhttp", "milo", "prepare"]
  command = "clang++"
  args = [
    "-std=c++11",
    "-O3",
    "-march=native",
    "-flto",
    "-DNDEBUG",
    "-I",
    "${MILO_INCLUDE_DIR}",
    "-I",
    "${LLHTTP_INCLUDE_DIR}",
    "-o",
    "${OUTPUT_BIN}",
    "src/main.cc",
    "${MILO_LIB}",
    "${LLHTTP_LIB}",
  ]

[tasks.prepare]
  script = ["mkdir -p ${OUTPUT_DIR}", "rm -rf ${OUTPUT_BIN}"]

[tasks.milo]
  dependencies = ["milo:headers", "milo:release"]

[tasks."milo:headers"]
  cwd     = "../../parser"
  command = "makers"
  args    = ["cpp:headers"]

[tasks."milo:release"]
  cwd     = "../../parser"
  env     = { RUSTFLAGS = "${MILO_RUSTFLAGS}" }
  command = "makers"
  args    = ["cpp:release"]

[tasks.llhttp]
  script = [
    "mkdir -p ../../tmp/external",
    "rm -rf ${LLHTTP_DIR}",
    "curl -L --fail --silent --show-error https://github.com/nodejs/llhttp/archive/refs/tags/release/${LLHTTP_RELEASE}.tar.gz -o ../../tmp/external/llhttp-release-${LLHTTP_RELEASE}.tar.gz",
    "tar -xzf ../../tmp/external/llhttp-release-${LLHTTP_RELEASE}.tar.gz -C ../../tmp/external",
    "rm -f ../../tmp/external/llhttp-release-${LLHTTP_RELEASE}.tar.gz",
    "mkdir -p ${LLHTTP_DIR}/build",
    "clang -O3 -DNDEBUG -march=native -flto -fPIC -I ${LLHTTP_DIR}/include -c ${LLHTTP_DIR}/src/llhttp.c -o ${LLHTTP_DIR}/build/llhttp.o",
    "clang -O3 -DNDEBUG -march=native -flto -fPIC -I ${LLHTTP_DIR}/include -c ${LLHTTP_DIR}/src/api.c -o ${LLHTTP_DIR}/build/api.o",
    "clang -O3 -DNDEBUG -march=native -flto -fPIC -I ${LLHTTP_DIR}/include -c ${LLHTTP_DIR}/src/http.c -o ${LLHTTP_DIR}/build/http.o",
    "ar rcs ${LLHTTP_LIB} ${LLHTTP_DIR}/build/llhttp.o ${LLHTTP_DIR}/build/api.o ${LLHTTP_DIR}/build/http.o",
  ]
