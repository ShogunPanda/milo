[config]
  skip_core_tasks = true

[tasks.default]
  dependencies = ["build"]

[tasks.build]
  command = "npm"
  args    = ["run", "prepare"]

[tasks.benchmarks]
  command = "node"
  args    = ["src/index.js"]

[tasks.lint]
  command = "eslint"
  args    = ["--cache", "--ext", ".js", "src"]

[tasks."lint:fix"]
  command = "eslint"
  args    = ["--cache", "--fix", "--ext", ".js", "src"]

[tasks.format]
  command = "prettier"
  args    = ["-w", "src"]

[tasks.verify]
  dependencies = ["format", "lint", "benchmarks"]
